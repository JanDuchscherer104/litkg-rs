[[integrations]]
benchmark_id = "reporeason"
upstream_status = "official_pipeline"
runner_kind = "external_command"
summary = "The upstream RepoReasoner repository includes dataset-generation and evaluation scripts, but expects a separate checkout plus Python and Docker setup."
required_binaries = ["python3", "docker"]
bootstrap_steps = [
  "Clone https://github.com/DeepSoftwareAnalytics/RepoReasoner and install its project dependencies.",
  "Populate the expected repository inputs and API configuration described by the upstream README.",
  "Wrap the chosen evaluation script so it writes normalized JSON to $LITKG_BENCHMARK_OUTPUT_PATH.",
]
example_commands = [
  "python evaluation_output_prediction.py",
  "python evaluation_callchain_prediction.py",
]
notes = [
  "The upstream repo is a benchmark pipeline rather than a single packaged CLI.",
]

  [[integrations.official_sources]]
  label = "github"
  url = "https://github.com/DeepSoftwareAnalytics/RepoReasoner"

  [[integrations.official_sources]]
  label = "paper"
  url = "https://arxiv.org/abs/2601.03731"

