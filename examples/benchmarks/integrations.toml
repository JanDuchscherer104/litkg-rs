[[integrations]]
benchmark_id = "terminal-bench"
upstream_status = "official_harness"
runner_kind = "external_command"
summary = "Terminal-Bench ships a public CLI harness (`tb`) plus dataset registry. Local runs require the Terminal-Bench package and Docker."
required_binaries = ["tb", "docker"]
bootstrap_steps = [
  "Install Terminal-Bench with `uv tool install terminal-bench` or `pip install terminal-bench`.",
  "Run `tb run ...` against the desired dataset and adapt the result artifact into normalized JSON.",
]
example_commands = [
  "tb run --agent <agent> --model <model> --dataset-name terminal-bench-core --dataset-version 0.1.1",
]
notes = [
  "The upstream maintainers now recommend the Harbor framework for new users, but the `tb` CLI remains the official runnable surface.",
]

  [[integrations.official_sources]]
  label = "github"
  url = "https://github.com/harbor-framework/terminal-bench"

  [[integrations.official_sources]]
  label = "docs"
  url = "https://www.tbench.ai/docs"
