[[integrations]]
benchmark_id = "swe-bench-pro"
upstream_status = "official_harness"
runner_kind = "external_command"
summary = "ScaleAI publishes an open-source evaluation repo plus a Hugging Face dataset. Local runs require a patch-generation harness and Docker-backed evaluation."
required_binaries = ["python3", "docker"]
bootstrap_steps = [
  "Clone https://github.com/scaleapi/SWE-bench_Pro-os and install its Python requirements.",
  "Prepare patch predictions with a compatible agent harness, then run swe_bench_pro_eval.py.",
  "Wrap the evaluation command so it writes normalized JSON to $LITKG_BENCHMARK_OUTPUT_PATH.",
]
example_commands = [
  "python swe_bench_pro_eval.py --raw_sample_path <csv> --patch_path <patches.json> --output_dir \"$LITKG_BENCHMARK_ARTIFACT_DIR\"",
]
notes = [
  "The official repo supports Modal or local Docker evaluation.",
  "litkg-rs does not generate patches itself; it normalizes benchmark execution around external harness commands.",
]

  [[integrations.official_sources]]
  label = "github"
  url = "https://github.com/scaleapi/SWE-bench_Pro-os"

  [[integrations.official_sources]]
  label = "dataset"
  url = "https://huggingface.co/datasets/ScaleAI/SWE-bench_Pro"

