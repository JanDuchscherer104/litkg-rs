[[runs]]
benchmark_id = "aria-nbv-local-repo-qa"
run_id = "aria-nbv-local-repo-qa-direct"
command = "python3 scripts/benchmarks/run_repo_qa.py --dataset examples/benchmarks/local_repo_qa/aria-nbv.jsonl --repo-root \"$ARIA_NBV_REPO_ROOT\" --model \"$LITKG_REPO_QA_MODEL\" --answerer direct --persist-artifact-dir examples/benchmarks/local_repo_qa/artifacts/aria-nbv"
workdir = "/home/jd/repos/ARIA-NBV/.agents/external/litkg-rs"

  [runs.env]
  ARIA_NBV_REPO_ROOT = "/home/jd/repos/ARIA-NBV"
  LITKG_REPO_QA_MODEL = "qwen3-coder:30b"

[[runs]]
benchmark_id = "nbv-local-repo-qa"
