[[benchmarks]]
id = "swe-bench-pro"
name = "SWE-Bench Pro"
best_use = "Top-line public benchmark for long-horizon software-engineering task resolution."
task_scale = "1,865 tasks across 41 repositories, split into 731 public, 276 commercial, and 858 held-out tasks."
summary = "Contamination-resistant successor to the older SWE-Bench family with enterprise-like, multi-file, long-horizon tasks."
dataset_notes = [
  "Primary public issue-resolution benchmark for KG-assisted coding agents.",
  "Pass@1 is reported as resolve rate in the paper.",
  "Commercial and held-out sets are not publicly released.",
]
tags = [
  "issue-resolution",
  "long-horizon",
  "public-benchmark",
  "contamination-resistant",
]

  [[benchmarks.metrics]]
  id    = "pass_at_1"
  label = "Pass@1"
  notes = "Resolve rate under the benchmark scaffold."

  [[benchmarks.metrics]]
  id    = "failure_mode_analysis"
  label = "Failure Mode Analysis"
  notes = "LLM-as-judge trajectory bucket analysis used for diagnostic breakdowns."

  [[benchmarks.sources]]
  label = "paper"
  url   = "https://arxiv.org/abs/2509.16941"

[[benchmarks]]
id = "swe-qa-pro"
name = "SWE-QA-Pro"
best_use = "Direct evaluation of repository-grounded QA and codebase exploration."
task_scale = "260 questions from 26 long-tail repositories, with 4 to 9 questions per semantic cluster."
summary = "Repository-level QA benchmark that filters out questions solvable without grounded codebase exploration."
dataset_notes = [
  "Python-only in the current release because repositories require executable sandboxes.",
  "Answers are expected to cite file paths and line numbers.",
  "Strongest public fit for a KG-backed repository QA skill.",
]
tags = ["repo-qa", "grounding", "navigation", "tool-use"]

  [[benchmarks.metrics]]
  id    = "correctness"
  label = "Correctness"
  notes = "LLM-as-judge score from 1 to 10."

  [[benchmarks.metrics]]
  id    = "completeness"
  label = "Completeness"
  notes = "LLM-as-judge score from 1 to 10."

  [[benchmarks.metrics]]
  id    = "relevance"
  label = "Relevance"
  notes = "LLM-as-judge score from 1 to 10."

  [[benchmarks.metrics]]
  id    = "clarity"
  label = "Clarity"
  notes = "LLM-as-judge score from 1 to 10."

  [[benchmarks.metrics]]
  id    = "reasoning_quality"
  label = "Reasoning Quality"
  notes = "LLM-as-judge score from 1 to 10."

  [[benchmarks.sources]]
  label = "paper"
  url   = "https://arxiv.org/abs/2603.16124"

  [[benchmarks.sources]]
  label = "github"
  url   = "https://github.com/TIGER-AI-Lab/SWE-QA-Pro"

[[benchmarks]]
id = "coderepoqa"
name = "CodeRepoQA"
best_use = "Large-scale multilingual, multi-turn software-engineering QA stress test."
task_scale = "585,687 multi-turn QA entries from 30 repositories across 5 languages, averaging 6.62 turns per entry."
summary = "Large repository QA benchmark built from GitHub issues and maintainer responses."
dataset_notes = [
  "Useful for scale and dialogue context testing.",
  "Metrics are lexical overlap metrics rather than grounded execution or structured judging.",
]
tags = ["repo-qa", "multilingual", "multi-turn", "large-scale"]

  [[benchmarks.metrics]]
  id    = "bleu"
  label = "BLEU"
  notes = "N-gram precision with brevity penalty."

  [[benchmarks.metrics]]
  id    = "rouge_l"
  label = "ROUGE-L"
  notes = "Longest common subsequence overlap."

  [[benchmarks.metrics]]
  id    = "rouge_1"
  label = "ROUGE-1"
  notes = "Unigram overlap."

  [[benchmarks.metrics]]
  id    = "edit_similarity"
  label = "Edit Similarity"
  notes = "Edit-distance-oriented similarity score."

  [[benchmarks.sources]]
  label = "paper"
  url   = "https://arxiv.org/abs/2412.14764"

  [[benchmarks.sources]]
  label = "github"
  url   = "https://github.com/kinesiatricssxilm14/CodeRepoQA"

